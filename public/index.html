<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dahee Kim — Graph Mining Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0}
.page{--accent:#b5623f;--ink:#211d18;--muted:#6f6656;--line:#ddd3c2;--paper:#f5f0e6;--panel:#fbf8f1;background:var(--paper);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.serif{font-family:'Newsreader',Georgia,serif}
.mono{font-family:'Space Mono',ui-monospace,monospace}
.wrap{max-width:1120px;margin:0 auto;padding:0 32px}
.nav{position:sticky;top:0;z-index:30;background:rgba(245,240,230,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.navin{max-width:1120px;margin:0 auto;padding:13px 32px;display:flex;align-items:center;justify-content:space-between;gap:18px}
.brand{display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--ink);text-transform:uppercase;white-space:nowrap}
.brand b{color:var(--accent)}
.tabs{display:flex;flex-wrap:wrap;gap:6px 22px}
.tab{font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:5px 0;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;transition:color .15s,border-color .15s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);border-bottom-color:var(--accent)}
.lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--panel)}
.lo{font-family:'Space Mono',monospace;font-size:11.5px;padding:6px 13px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:background .15s,color .15s}
.lo.on{background:var(--ink);color:var(--paper)}
.hero{position:relative;display:grid;grid-template-columns:1.35fr .65fr;gap:44px;align-items:center;padding:72px 0 56px}
.gcanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.9}
.heroL,.heroR{position:relative;z-index:1}
.eyeline{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0}
.name{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:92px;line-height:.92;letter-spacing:-.01em;margin:14px 0 0}
.kname{font-family:'Newsreader',Georgia,serif;font-style:italic;font-size:22px;color:var(--muted);margin:10px 0 0}
.lead{max-width:54ch;font-size:16.5px;line-height:1.72;color:#413b31;margin:22px 0 0}
.lead b{font-weight:600;color:var(--ink)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
.pill{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:var(--panel)}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.chip{font-size:13px;padding:9px 17px;border:1px solid var(--ink);border-radius:8px;color:var(--ink);background:transparent;transition:background .18s,color .18s}
.chip:hover{background:var(--ink);color:var(--paper);text-decoration:none}
.heroR{display:flex;justify-content:center}
.photoframe{position:relative;padding:9px;background:var(--panel);border:1px solid var(--line);border-radius:6px;box-shadow:0 24px 50px -28px rgba(33,29,24,.5)}
.photo{display:block;width:100%;max-width:288px;aspect-ratio:4/5;object-fit:cover;border-radius:3px}
.photbadge{position:absolute;left:-14px;bottom:26px;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper);background:var(--accent);padding:6px 11px;border-radius:5px;box-shadow:0 8px 20px -10px rgba(33,29,24,.7)}
.sec{padding:52px 0;border-top:1px solid var(--line);position:relative}
.sec::before{content:"";position:absolute;left:21px;top:0;bottom:0;width:1.5px;background:repeating-linear-gradient(var(--line) 0 5px,transparent 5px 11px)}
.sechead{display:flex;align-items:center;gap:20px;margin-bottom:30px}
.secnum{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;flex:none;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--accent);background:var(--paper);color:var(--accent);font-family:'Space Mono',monospace;font-size:13px;box-shadow:0 0 0 5px var(--paper)}
.degnode{margin-left:auto;display:flex;align-items:center;flex:none}
.degedge{width:38px;height:0;border-top:1.5px dashed var(--line)}
.degcap{display:flex;flex-direction:column;align-items:center;gap:4px}
.degdot{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:46px;padding:0 13px;border-radius:999px;border:1.5px solid var(--accent);background:var(--panel);font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--ink)}
.deglabel{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.mark{width:27px;height:27px;flex:none;overflow:visible;color:var(--ink)}
.sectitle{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:36px;line-height:1;margin:0;letter-spacing:-.01em}
.seclead{font-size:14px;color:var(--muted);margin:6px 0 0}
.pubgroup{font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:34px 0 6px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.pubgroup:first-child{margin-top:0}
.pub{display:grid;grid-template-columns:40px 1fr;gap:18px;padding:20px 0;border-top:1px solid var(--line)}
.pub:first-of-type{border-top:none}
.pubidx{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);padding-top:2px}
.authors{font-size:14px;color:#5a5344;line-height:1.55}
.au{color:#5a5344}
.me{font-weight:700;color:var(--ink)}
.ptitle{font-size:16px;color:var(--ink);line-height:1.45;margin:5px 0 0;font-weight:500}
.venue{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-top:8px;padding:3px 9px;border:1px solid var(--line);border-radius:4px;background:var(--panel)}
.plinks{display:inline-flex;flex-wrap:wrap;gap:8px 14px;margin-left:10px}
.plink{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:1px}
.plink:hover{color:var(--accent);border-bottom-color:var(--accent);text-decoration:none}
.metaline{display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.rows{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:1fr auto;gap:6px 28px;padding:15px 0;border-top:1px solid var(--line)}
.row:first-child{border-top:none}
.rt{font-size:14.5px;color:var(--ink);line-height:1.5}
.rm{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--muted);white-space:nowrap;text-align:right;padding-top:2px}
.rs{grid-column:1/-1;font-size:13px;color:var(--muted);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 56px}
.foot{padding:56px 0 64px;border-top:1px solid var(--line);text-align:center}
.foot .mono{font-size:12px;color:var(--muted)}
.intro{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:90px 24px}
.introcanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.introin{position:relative;z-index:1;max-width:960px}
.bigname{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:clamp(44px,8.5vw,104px);line-height:.9;letter-spacing:-.02em;margin:18px 0 0;animation:nameIn 1.15s cubic-bezier(.2,.7,.2,1) both}
@keyframes nameIn{from{opacity:0;transform:translateY(22px);letter-spacing:.05em;filter:blur(8px)}to{opacity:1;transform:none;letter-spacing:-.02em;filter:none}}
.eyeline{animation:eyeIn 1s ease .05s both}
@keyframes eyeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.navactions{display:flex;align-items:center;gap:12px}
.night{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:15px;cursor:pointer;transition:color .15s,border-color .15s}
.night:hover{color:var(--accent);border-color:var(--accent)}
.pills.center{justify-content:center;margin-top:30px}
.scrollcue{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:1;display:flex;flex-direction:column;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;cursor:pointer;animation:bob 1.9s ease-in-out infinite}
.scrollcue:hover{color:var(--accent)}
.scrollcue span{font-size:16px}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
.aboutgrid{display:grid;grid-template-columns:1.35fr .65fr;gap:44px;align-items:center}
.page.dark{--ink:#efe9dd;--muted:#9c917e;--line:#39332a;--paper:#15120e;--panel:#211c16}
.dark .nav{background:rgba(21,18,14,.82)}
.dark .lead{color:#cfc7b7}
.dark .authors,.dark .au{color:#a79c88}
.dark .photoframe{box-shadow:0 24px 55px -26px rgba(0,0,0,.75)}
@media(max-width:880px){.aboutgrid{grid-template-columns:1fr;gap:32px}.heroR{justify-content:flex-start}.grid2{grid-template-columns:1fr}.row{grid-template-columns:1fr}.rm{text-align:left}.sectitle{font-size:30px}.intro{min-height:88vh;padding:80px 20px}}
</style>
</head>
<body>

<div id="app" class="page"></div>
<script src="content.js"></script>
<script>
const NAV = [
  { id:"about", label:"About" },
  { id:"publications", label:"Publications" },
  { id:"awards", label:"Awards" },
  { id:"teaching", label:"Teaching" },
  { id:"education", label:"Education" },
  { id:"experience", label:"Experience" }
];
function initialDark(){
  const mode = DATA.darkMode || "manual";
  if(mode==="system"){ return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
  if(mode==="time"){ const h=new Date().getHours(); const f=DATA.darkFrom??19, t=DATA.darkTo??7; return f<=t ? (h>=f&&h<t) : (h>=f||h<t); }
  return !!DATA.startDark;
}
const state = { lang: "en", active: "about", dark: initialDark(), userSet: false };
if(window.matchMedia){ window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e=>{ if((DATA.darkMode||"manual")==="system" && !state.userSet){ state.dark=e.matches; render(); } }); }

function segAuthors(str){
  const parts = String(str).split(/(Dahee Kim\*|Dahee Kim|김다희)/g).filter(p=>p!=="");
  return parts.map(p => /^(Dahee Kim\*?|김다희)$/.test(p)
    ? '<span class="me">'+p+'</span>' : '<span class="au">'+p+'</span>').join('');
}
function pubRow(p,i){
  const links = (p.links||[]).map(l=>'<a class="plink" href="'+l.href+'" target="_blank" rel="noreferrer">'+l.label+'</a>').join('');
  return '<div class="pub"><span class="pubidx">'+String(i+1).padStart(2,"0")+'</span><div>'
    +'<div class="authors">'+segAuthors(p.authors)+'</div>'
    +'<div class="ptitle">'+p.title+'</div>'
    +'<div class="metaline"><span class="venue">'+p.venue+'</span><span class="plinks">'+links+'</span></div>'
    +'</div></div>';
}
function rowItem(it){
  return '<div class="row"><div class="rt">'+it.title+'</div><div class="rm">'+(it.meta||"")+'</div>'
    +(it.sub?'<div class="rs">'+it.sub+'</div>':'')+'</div>';
}
function render(){
  const lang = state.lang;
  const domPubs = lang==="en" ? DATA.pubDomEN : DATA.pubDomKO;
  const awards = lang==="en" ? DATA.awardsEN : DATA.awardsKO;
  const teaching = lang==="en" ? DATA.teachingEN : DATA.teachingKO;
  const counts = {
    pub: DATA.pubIntl.length + domPubs.length,
    awards: awards.length, teaching: teaching.length,
    activities: DATA.activities.length, education: DATA.education.length,
    experience: DATA.experience.length, patents: DATA.patents.length
  };
  const deg = (n,l)=>'<span class="degnode"><span class="degedge"></span><span class="degcap"><span class="degdot">'+n+'</span><span class="deglabel">'+l+'</span></span></span>';
  const tabs = NAV.map(n=>'<button class="tab'+(state.active===n.id?' on':'')+'" data-goto="'+n.id+'">'+n.label+'</button>').join('');
  const chips = DATA.links.map(l=>'<a class="chip" href="'+l.href+'" target="_blank" rel="noreferrer">'+l.label+'</a>').join('');

  const app = document.getElementById("app");
  app.className = state.dark ? "page dark" : "page";
  app.style.setProperty("--accent", DATA.accent);

  app.innerHTML =
  '<header class="nav"><div class="navin">'
    +'<div class="brand"><svg class="mark" viewBox="0 0 32 32" aria-hidden="true"><g stroke="currentColor" stroke-width="1.3" opacity="0.4"><line x1="12" y1="13" x2="19" y2="11"></line><line x1="19" y1="11" x2="16" y2="19"></line><line x1="16" y1="19" x2="12" y2="13"></line><line x1="19" y1="11" x2="27" y2="21"></line><line x1="12" y1="13" x2="6" y2="24"></line></g><g fill="var(--accent)"><circle cx="12" cy="13" r="3.1"></circle><circle cx="19" cy="11" r="3.1"></circle><circle cx="16" cy="19" r="3.1"></circle></g><circle cx="27" cy="21" r="2.2" fill="currentColor"></circle><circle cx="6" cy="24" r="2.2" fill="currentColor"></circle></svg>'+DATA.brand+'</div>'
    +'<nav class="tabs">'+tabs+'</nav>'
    +'<div class="navactions"><button class="night" id="nightbtn" title="Night mode">'+(state.dark?"☀":"☾")+'</button>'
    +'<div class="lang"><button class="lo'+(lang==="en"?" on":"")+'" data-lang="en">EN</button><button class="lo'+(lang==="ko"?" on":"")+'" data-lang="ko">KO</button></div></div>'
    +'</div></header>'
  +'<section id="intro" class="intro"><canvas class="introcanvas" id="introcanvas"></canvas>'
    +'<div class="introin">'+(DATA.eyeline?'<p class="eyeline">'+DATA.eyeline+'</p>':'')+'<h1 class="bigname" style="font-size:'+(DATA.nameSize||'clamp(44px,8.5vw,104px)')+'">'+DATA.bigName+'</h1></div>'
    +'<button class="scrollcue" data-goto="about"><span>↓</span></button></section>'
  +'<main class="wrap">'
    +'<section id="about" class="sec about"><div class="sechead"><span class="secnum">00</span><div><h2 class="sectitle">About</h2></div></div>'
      +'<div class="aboutgrid"><div><p class="lead">'+DATA.aboutLead+'</p><div class="chips">'+chips+'</div></div>'
      +'<div class="heroR"><div class="photoframe"><img class="photo" src="'+DATA.profile+'" alt="'+DATA.bigName+'"></div></div></div></section>'
    +'<section id="publications" class="sec"><div class="sechead"><span class="secnum">01</span><div><h2 class="sectitle">Publications</h2></div>'+deg(counts.pub,"papers")+'</div>'
      +'<h3 class="pubgroup">International</h3><div>'+DATA.pubIntl.map(pubRow).join('')+'</div>'
      +'<h3 class="pubgroup">Domestic</h3><div>'+domPubs.map(pubRow).join('')+'</div></section>'
    +'<section id="awards" class="sec"><div class="sechead"><span class="secnum">02</span><div><h2 class="sectitle">Awards & Scholarship</h2></div>'+deg(counts.awards,"awards")+'</div><div class="rows">'+awards.map(rowItem).join('')+'</div></section>'
    +(lang==="ko" ? '<section id="patents" class="sec"><div class="sechead"><span class="secnum">✦</span><div><h2 class="sectitle">Patents</h2></div>'+deg(counts.patents,"patents")+'</div><div class="rows">'+DATA.patents.map(rowItem).join('')+'</div></section>' : '')
    +'<section id="teaching" class="sec"><div class="sechead"><span class="secnum">03</span><div><h2 class="sectitle">Teaching Assistant</h2></div>'+deg(counts.teaching,"courses")+'</div><div class="rows">'+teaching.map(rowItem).join('')+'</div></section>'
    +'<section id="activities" class="sec"><div class="sechead"><span class="secnum">04</span><div><h2 class="sectitle">Academic Activities</h2></div>'+deg(counts.activities,"roles")+'</div><div class="rows grid2">'+DATA.activities.map(rowItem).join('')+'</div></section>'
    +'<section id="education" class="sec"><div class="sechead"><span class="secnum">05</span><div><h2 class="sectitle">Education</h2></div>'+deg(counts.education,"degrees")+'</div><div class="rows">'+DATA.education.map(rowItem).join('')+'</div></section>'
    +'<section id="experience" class="sec"><div class="sechead"><span class="secnum">06</span><div><h2 class="sectitle">Research Experience</h2></div>'+deg(counts.experience,"roles")+'</div><div class="rows">'+DATA.experience.map(rowItem).join('')+'</div></section>'
  +'</main>';

  app.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>{
    const el=document.getElementById(b.getAttribute("data-goto"));
    if(el) window.scrollTo({top: el.getBoundingClientRect().top+window.scrollY-70, behavior:"smooth"});
  });
  app.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{ state.lang=b.getAttribute("data-lang"); render(); });
  document.getElementById("nightbtn").onclick=()=>{ state.dark=!state.dark; state.userSet=true; render(); };
  startGraph();
}

let _raf=0, _ro=null;
function startGraph(){
  cancelAnimationFrame(_raf); if(_ro){_ro.disconnect();_ro=null;}
  const canvas=document.getElementById("introcanvas"); if(!canvas) return;
  const ctx=canvas.getContext("2d");
  const accent=DATA.accent;
  const ink=state.dark?"#efe9dd":"#211d18";
  const panel=state.dark?"#211c16":"#fbf8f1";
  const labels=DATA.keywords.slice(0,4);
  const N=56, link=0.17;
  const hotA=0.4,coldA=0.14,nodeA=0.42,hotNodeA=1,scale=1.3;
  let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  const rrect=(x,y,w,h,r)=>{ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;} ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();};
  const resize=()=>{const r=canvas.getBoundingClientRect();W=r.width;H=r.height;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);};
  resize(); _ro=new ResizeObserver(resize); _ro.observe(canvas);
  const anchors=[[0.16,0.19],[0.84,0.235],[0.17,0.8],[0.83,0.78]];
  const coreStart=labels.length, coreCount=Math.round(N*0.2);
  const nodes=[];
  for(let i=0;i<N;i++){const label=labels[i]||null;const a=label?anchors[i]:null;
    nodes.push({x:a?a[0]:0.06+Math.random()*0.88,y:a?a[1]:0.08+Math.random()*0.84,ax:a?a[0]:0,ay:a?a[1]:0,ph:Math.random()*6.28,vx:(Math.random()-0.5)*0.0003,vy:(Math.random()-0.5)*0.0003,r:1.5+Math.random()*2.3,hot:!label&&i>=coreStart&&i<coreStart+coreCount,hollow:!label&&Math.random()>0.5,label});}
  let tms=0;
  const draw=()=>{
    ctx.clearRect(0,0,W,H); tms+=0.008;
    for(const n of nodes){ if(n.label){n.x=n.ax+Math.sin(tms+n.ph)*0.012;n.y=n.ay+Math.cos(tms*0.8+n.ph)*0.012;} else {n.x+=n.vx;n.y+=n.vy; if(n.x<0.03||n.x>0.97)n.vx*=-1; if(n.y<0.05||n.y>0.95)n.vy*=-1;} }
    const hx=0.5*W,hy=0.52*H;
    for(const n of nodes){ if(!n.label)continue; ctx.globalAlpha=0.1+0.09*Math.sin(tms*1.6+n.ph); ctx.strokeStyle=accent; ctx.lineWidth=0.9; ctx.beginPath();ctx.moveTo(n.x*W,n.y*H);ctx.lineTo(hx,hy);ctx.stroke(); }
    ctx.globalAlpha=0.45+0.3*Math.abs(Math.sin(tms*1.6)); ctx.fillStyle=accent; ctx.beginPath();ctx.arc(hx,hy,3.4,0,6.283);ctx.fill(); ctx.globalAlpha=1;
    for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];const dx=a.x-b.x,dy=a.y-b.y;const d=Math.hypot(dx,dy);
      if(d<link){const t=1-d/link;const both=a.hot&&b.hot;ctx.strokeStyle=both?accent:ink;ctx.globalAlpha=(both?hotA:coldA)*t;ctx.lineWidth=both?1.1:0.7;ctx.beginPath();ctx.moveTo(a.x*W,a.y*H);ctx.lineTo(b.x*W,b.y*H);ctx.stroke();}}}
    for(const n of nodes){const px=n.x*W,py=n.y*H;
      if(n.label){ctx.font="600 11.5px 'Space Mono', ui-monospace, monospace";const tw=ctx.measureText(n.label).width;const chipH=26,dot=4.5,padL=13,padR=13,gap=8;const chipW=padL+dot*2+gap+tw+padR;const left=n.ax<0.5;const cx=left?px-7:px-chipW+7;const cy=py-chipH/2;
        ctx.globalAlpha=1;rrect(cx,cy,chipW,chipH,chipH/2);ctx.fillStyle=panel;ctx.fill();ctx.lineWidth=1.3;ctx.strokeStyle=accent;ctx.globalAlpha=0.85;ctx.stroke();
        ctx.globalAlpha=1;ctx.fillStyle=accent;ctx.beginPath();ctx.arc(cx+padL+dot,py,dot,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=ink;ctx.textBaseline="middle";ctx.textAlign="left";ctx.fillText(n.label,cx+padL+dot*2+gap,py+0.5);ctx.textAlign="start";}
      else if(n.hollow){ctx.globalAlpha=nodeA+0.12;ctx.strokeStyle=ink;ctx.lineWidth=1;ctx.beginPath();ctx.arc(px,py,n.r*scale,0,Math.PI*2);ctx.stroke();}
      else{ctx.globalAlpha=n.hot?hotNodeA:nodeA;ctx.fillStyle=n.hot?accent:ink;ctx.beginPath();ctx.arc(px,py,(n.hot?n.r+0.6:n.r)*scale,0,Math.PI*2);ctx.fill();}}
    ctx.globalAlpha=1; _raf=requestAnimationFrame(draw);
  };
  draw();
}

function updateActive(){
  const top=90,zone=top+380; let cur;
  if(window.innerHeight+window.scrollY>=document.body.scrollHeight-4){cur="experience";}
  else{let best=-Infinity;cur=state.active;for(const n of NAV){const el=document.getElementById(n.id);if(!el)continue;const r=el.getBoundingClientRect();const ov=Math.min(r.bottom,zone)-Math.max(r.top,top);if(ov>best){best=ov;cur=n.id;}}}
  if(cur!==state.active){state.active=cur; document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.getAttribute("data-goto")===cur));}
}
window.addEventListener("scroll",updateActive,{passive:true});
window.addEventListener("resize",updateActive);

function init(){ if(!window.DATA){document.getElementById("app").innerHTML='<p style="padding:40px;font-family:sans-serif">content.js 파일을 찾을 수 없습니다. dahee-home.html 과 같은 폴더에 content.js 를 두세요.';return;} render(); updateActive(); }
if(document.readyState!=="loading") init(); else document.addEventListener("DOMContentLoaded",init);
</script>
